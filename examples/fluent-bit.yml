# /opt/fluent-bit/bin/fluent-bit -c ./examples/fluent-bit.yml
plugins:
  - ./fluent-bit-cc.so

service:
    flush: 1         # 从input到output多久刷新一次，纳秒级
    daemon: Off      # systemctl时不启用
    log_level: info # 日志级别
    http_server: Off # 禁用HTTP服务
    parsers_file: /etc/fluent-bit/parsers.conf # 加载一些默认的解析器

pipeline:
  inputs:
    - name: dummy
      dummy: '{"request_path":"/test.jpg","request_host":"a.com","client_ip":"1.2.3.4","response_body_bytes":123123123,"url":"http://a.com/a"}'

  outputs:
    - name: fluent-bit-stats
      match: "*"
      config: "./examples/rules.json"    # 配置文件
      interval: 5s                       # 检查配置文件的改动间隔时间，当文件改动时，自动重新加载
      debug: trace                       # 是否开启调试模式，默认关闭，可选值有： trace, debug, info, warn, error
